# For VPS / home server. On Render you don't need this — see README.
# 1) cp .env.example .env   2) put a token into .env   3) docker compose up -d --build
services:
  audio:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./cache:/data/cache
    env_file:
      - .env
