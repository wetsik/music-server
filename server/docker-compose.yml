# For VPS / home server. On Render you don't need this — see README.
services:
  audio:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./cache:/data/cache
    environment:
      - MAX_CACHE_MB=4096
      # - ACCESS_TOKEN=change-me-to-a-long-random-string
      # - COOKIES_CONTENT=...   # optional, if YouTube blocks the server IP
