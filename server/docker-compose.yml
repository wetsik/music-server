# For VPS / home server. On Render you don't need this — see README.
# 1) cp .env.example .env   2) put a token into .env   3) docker compose up -d --build
services:
  # HTTPS reverse proxy — auto Let's Encrypt cert for the domain in Caddyfile.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - audio

  audio:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./cache:/data/cache
    env_file:
      - .env
    environment:
      # Reach the PoToken sidecar by its compose service name.
      - YTDLP_POT_BASEURL=http://bgutil-provider:4416
    depends_on:
      - bgutil-provider

  # Generates YouTube PoTokens locally so yt-dlp passes the bot check without
  # constantly re-exporting cookies. Internal only — no published port.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
